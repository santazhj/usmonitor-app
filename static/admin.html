<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f4ef" />
    <link rel="icon" href="/icon.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
    <title>Serenity Admin</title>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="/">
          <img src="/icon.svg" alt="" />
          <span>Serenity Admin</span>
        </a>
        <nav class="nav-actions">
          <span id="adminSession" class="admin-session hidden"></span>
          <a class="quiet-link" href="/">App</a>
        </nav>
      </header>

      <section id="accessGate" class="panel access-gate">
        <div class="section-title">
          <p class="eyebrow">Admin Check</p>
          <h2>正在验证管理员权限</h2>
        </div>
        <p id="accessMessage" class="status-line">请稍候。</p>
        <a id="accessAction" class="primary access-action hidden" href="/">回到 App 登录</a>
      </section>

      <section id="adminContent" class="admin-layout hidden">
        <section class="panel wide">
          <div class="section-title">
            <p class="eyebrow">Metrics</p>
            <h2>概览</h2>
          </div>
          <div id="countsBox" class="metrics-grid"></div>
          <p id="adminMessage" class="status-line"></p>
        </section>

        <section class="panel wide">
          <div class="section-title">
            <p class="eyebrow">Members</p>
            <h2>用户与会员</h2>
          </div>
          <div id="usersBox" class="admin-table"></div>
        </section>

        <section class="panel wide">
          <div class="section-title">
            <p class="eyebrow">Traffic</p>
            <h2>页面浏览与停留</h2>
          </div>
          <div id="pageStatsBox" class="admin-table"></div>
        </section>

        <section class="panel wide">
          <div class="section-title">
            <p class="eyebrow">Payments</p>
            <h2>待确认付款</h2>
          </div>
          <div id="paymentsBox" class="table-list"></div>
        </section>

        <section class="panel wide">
          <div class="section-title">
            <p class="eyebrow">Sources</p>
            <h2>监控源</h2>
          </div>
          <div id="sourcesBox" class="table-list"></div>
        </section>

        <section class="panel wide">
          <div class="section-title">
            <p class="eyebrow">Jobs</p>
            <h2>任务记录</h2>
          </div>
          <div id="jobsBox" class="table-list"></div>
        </section>
      </section>
    </main>
    <script src="/static/admin.js?v=20260525-admin-bypass" type="module"></script>
  </body>
</html>
