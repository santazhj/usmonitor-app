<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f4ef" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
    <title>Serenity Alerts</title>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Serenity Alerts">
          <img src="/icon.svg" alt="" />
          <span>Serenity Alerts</span>
        </a>
        <nav class="nav-actions">
          <a id="adminLink" class="quiet-link hidden" href="/admin">Admin</a>
          <button id="logoutBtn" class="text-button hidden" type="button">退出</button>
        </nav>
      </header>

      <section id="authView" class="auth-grid hidden">
        <div class="auth-panel">
          <h1>Serenity Alerts</h1>
          <form id="loginForm" class="stack">
            <label>
              邮箱
              <input name="email" type="email" autocomplete="email" required />
            </label>
            <label>
              邀请码
              <input name="invite_code" type="text" autocomplete="one-time-code" />
            </label>
            <button class="primary" type="submit">发送登录链接</button>
          </form>
          <p id="loginMessage" class="status-line"></p>
        </div>
        <aside class="terms-panel">
          <p>99 USDT / 月</p>
          <p>邀请制。推送为情报摘要，不构成投资建议、收益承诺或个性化交易方案。</p>
        </aside>
      </section>

      <section id="appView" class="app-grid hidden">
        <section class="panel account-panel">
          <div>
            <p class="eyebrow">Account</p>
            <h2 id="accountEmail">-</h2>
          </div>
          <div id="subscriptionState" class="state-box"></div>
        </section>

        <section class="panel controls-panel">
          <div>
            <p class="eyebrow">Push</p>
            <h2>iPhone PWA</h2>
          </div>
          <div class="button-row">
            <button id="enablePushBtn" class="primary" type="button">开启推送</button>
            <button id="testPushBtn" class="secondary" type="button">测试推送</button>
          </div>
          <p id="pushStatus" class="status-line"></p>
        </section>

        <section class="panel payment-panel">
          <div>
            <p class="eyebrow">Payment</p>
            <h2>USDT 手动验款</h2>
          </div>
          <div id="paymentBox" class="payment-box"></div>
        </section>

        <section class="panel lists-panel">
          <div>
            <p class="eyebrow">Lists</p>
            <h2>监控列表</h2>
          </div>
          <div id="listBox" class="list-box"></div>
        </section>

        <section class="feed-section">
          <div class="section-title">
            <p class="eyebrow">Feed</p>
            <h2>最新提醒</h2>
          </div>
          <div id="feedBox" class="feed-list"></div>
        </section>
      </section>
    </main>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
